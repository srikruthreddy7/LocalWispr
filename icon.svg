<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>

  <!-- Voice waveform bars - symmetric, centered at y=512 -->
  <rect x="222" y="422" width="40" height="180" rx="20" fill="url(#bar)" opacity="0.5"/>
  <rect x="302" y="342" width="40" height="340" rx="20" fill="url(#bar)" opacity="0.65"/>
  <rect x="382" y="282" width="40" height="460" rx="20" fill="url(#bar)" opacity="0.8"/>
  <rect x="462" y="222" width="40" height="580" rx="20" fill="url(#bar)" opacity="0.9"/>
  <rect x="542" y="252" width="40" height="520" rx="20" fill="url(#bar)" opacity="0.85"/>
  <rect x="622" y="312" width="40" height="400" rx="20" fill="url(#bar)" opacity="0.75"/>
  <rect x="702" y="372" width="40" height="280" rx="20" fill="url(#bar)" opacity="0.6"/>
  <rect x="782" y="432" width="40" height="160" rx="20" fill="url(#bar)" opacity="0.45"/>
</svg>
